# Rate limiting
limit_req_zone $binary_remote_addr zone=ollama:10m rate=10r/m;

server {
    listen 127.0.0.1:8443 ssl;
    server_name localhost;

    # SSL
    ssl_certificate     /opt/homebrew/etc/nginx/ssl/ollama.crt;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/ollama.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Autenticación básica
    auth_basic           "Ollama Local";
    auth_basic_user_file /opt/homebrew/etc/nginx/.htpasswd;

    # Rate limiting
    limit_req zone=ollama burst=5 nodelay;

    # Headers de seguridad
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # Bloquear endpoints peligrosos
    location /api/delete {
        return 403;
    }
    location /api/push {
        return 403;
    }

    # Proxy a Ollama
    location / {
        proxy_pass         http://127.0.0.1:11434;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        client_max_body_size 10m;

        proxy_set_header Host localhost;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
